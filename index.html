<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Focus Fish</title>
</head>
<body>
    <div class="aquarium">
        <img class="seaweed1" src="images/seaweed1.svg" alt="seaweed1">
        <img class="seaweed2" src="images/seaweed2.svg" alt="seaweed2">
        <div class="sand-row">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand">
            <img class="sand" src="images/sand.svg" alt="sand"> 
        </div>
    </div>
    <div class="right-container">
        <div class="timer">
            <p id="display"></p>
            <button id="start">start</button>
            <button id="pause">pause</button>
            <button id="reset"> reset</button>
        </div>
        <div class="task-tracker">
            <button id="addfishbtn">add a fish!</button>
        </div>
    </div>
    <script src="fish.js"></script>
    <script src="timer.js"></script>
</body>
</html>
